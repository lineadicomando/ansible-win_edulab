---
- name: Revert to baseline
  ansible.builtin.import_playbook: virsh.yaml
  vars:
    vm: teacher
    cmd: snapshot-revert
    snapshot: baseline

- name: Wake host
  ansible.builtin.import_playbook: ../playbooks/wol.yaml
  vars:
    target_hosts: teacher

- name: Deploy Veyon
  ansible.builtin.import_playbook: ../playbooks/gcpw.yaml
  vars:
    target_hosts: teacher
