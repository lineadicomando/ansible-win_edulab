  gather_facts: false
  roles:
    - role: lineadicomando.win_workman.dispatcher
      vars:
        win_workman_tasks:
          - "libreoffice"
          - "chrome"
          - "sketchup2026"
          - "autocadlt2026"
          - "tinycad"
